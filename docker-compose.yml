services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: moodle
      POSTGRES_USER: moodleuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Manaus
    volumes:
      - /data/mboepi/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moodleuser -d moodle"]
      interval: 10s
      timeout: 5s
      retries: 5

  moodle:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MOODLE_DOMAIN: mboepi.tecnocomp.cloud
      MOODLE_URL: https://mboepi.tecnocomp.cloud

      MOODLE_DBTYPE: pgsql
      MOODLE_DBHOST: postgres
      MOODLE_DBNAME: moodle
      MOODLE_DBUSER: moodleuser
      MOODLE_DBPASS: ${POSTGRES_PASSWORD}
      MOODLE_DBPORT: 5432

      MOODLE_DATAROOT: /var/www/moodledata
      MOODLE_AUTO_INSTALL: ${MOODLE_AUTO_INSTALL}
      MOODLE_FULLNAME: ${MOODLE_FULLNAME}
      MOODLE_SHORTNAME: ${MOODLE_SHORTNAME}
      MOODLE_ADMIN_USER: ${MOODLE_ADMIN_USER}
      MOODLE_ADMIN_PASSWORD: ${MOODLE_ADMIN_PASSWORD}
      MOODLE_ADMIN_EMAIL: ${MOODLE_ADMIN_EMAIL}

      TZ: America/Manaus
    volumes:
      - /data/mboepi/moodledata:/var/www/moodledata
    expose:
      - "80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.moodle.rule=Host(`mboepi.tecnocomp.cloud`)
      - traefik.http.routers.moodle.entrypoints=websecure
      - traefik.http.routers.moodle.tls=true
      - traefik.http.services.moodle.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/login/index.php > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 240s

  cron:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      moodle:
        condition: service_started
    environment:
      MOODLE_URL: https://mboepi.tecnocomp.cloud

      MOODLE_DBTYPE: pgsql
      MOODLE_DBHOST: postgres
      MOODLE_DBNAME: moodle
      MOODLE_DBUSER: moodleuser
      MOODLE_DBPASS: ${POSTGRES_PASSWORD}
      MOODLE_DBPORT: 5432

      MOODLE_DATAROOT: /var/www/moodledata
      MOODLE_AUTO_INSTALL: "false"
      MOODLE_CRON_INTERVAL: ${MOODLE_CRON_INTERVAL}

      TZ: America/Manaus
    volumes:
      - /data/mboepi/moodledata:/var/www/moodledata
    command: ["/usr/local/bin/moodle-cron.sh"]
