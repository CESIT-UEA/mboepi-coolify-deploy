services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Manaus
    volumes:
      - ${POSTGRES_DATA_HOST_PATH}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  moodle:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MOODLE_DOMAIN: ${MOODLE_DOMAIN}
      MOODLE_URL: ${MOODLE_URL}

      MOODLE_DBTYPE: pgsql
      MOODLE_DBHOST: postgres
      MOODLE_DBNAME: ${POSTGRES_DB}
      MOODLE_DBUSER: ${POSTGRES_USER}
      MOODLE_DBPASS: ${POSTGRES_PASSWORD}
      MOODLE_DBPORT: 5432

      MOODLE_DATAROOT: /var/www/moodledata
      MOODLE_AUTO_INSTALL: ${MOODLE_AUTO_INSTALL}
      MOODLE_FULLNAME: ${MOODLE_FULLNAME}
      MOODLE_SHORTNAME: ${MOODLE_SHORTNAME}
      MOODLE_ADMIN_USER: ${MOODLE_ADMIN_USER}
      MOODLE_ADMIN_PASSWORD: ${MOODLE_ADMIN_PASSWORD}
      MOODLE_ADMIN_EMAIL: ${MOODLE_ADMIN_EMAIL}

      TZ: America/Manaus
    volumes:
      - ${MOODLE_DATA_HOST_PATH}:/var/www/moodledata
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -L http://localhost/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 240s

  cron:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      moodle:
        condition: service_started
    environment:
      MOODLE_URL: ${MOODLE_URL}

      MOODLE_DBTYPE: pgsql
      MOODLE_DBHOST: postgres
      MOODLE_DBNAME: ${POSTGRES_DB}
      MOODLE_DBUSER: ${POSTGRES_USER}
      MOODLE_DBPASS: ${POSTGRES_PASSWORD}
      MOODLE_DBPORT: 5432

      MOODLE_DATAROOT: /var/www/moodledata
      MOODLE_AUTO_INSTALL: "false"
      MOODLE_CRON_INTERVAL: ${MOODLE_CRON_INTERVAL}

      TZ: America/Manaus
    volumes:
      - ${MOODLE_DATA_HOST_PATH}:/var/www/moodledata
    command: ["/usr/local/bin/moodle-cron.sh"]