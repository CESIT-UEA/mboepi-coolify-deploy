server {
    listen 80;
    server_name _;

    # Moodle 4.4+ usa /public como raiz pública.
    root /var/www/moodle/public;
    index index.php index.html index.htm;

    client_max_body_size 1024M;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Processamento PHP com fallback para a raiz do Moodle.
    # Necessário para endpoints que não existem fisicamente dentro de /public,
    # como algumas rotas usadas por plugins/LTI.
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.*)$;

        set $moodle_root "/var/www/moodle/public";
        if (!-f $document_root$fastcgi_script_name) {
            set $moodle_root "/var/www/moodle";
        }

        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $moodle_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param DOCUMENT_ROOT   $moodle_root;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 8 128k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 300;
    }

    # Bloqueio de arquivos sensíveis.
    location ~ ^/(?:\.htaccess|config\.php|readme\.txt|composer\.(?:json|lock)|upgrade\.txt|db/install\.xml|version\.php|package\.json|Gruntfile\.js|phpunit\.xml) {
        deny all;
    }

    location ~ /\.(?!well-known).* {
        return 404;
    }

    # Cache de estáticos.
    location ~* \.(gif|jpg|jpeg|png|bmp|swf|js|css|woff|woff2|ttf|svg|ico)$ {
        expires 30d;
        access_log off;
        log_not_found off;
    }

    # Dataroot nunca deve ser público.
    location /dataroot/ {
        internal;
        alias /var/www/moodledata/;
    }
}
